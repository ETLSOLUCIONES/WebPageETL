<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Robot head -->
  <rect x="16" y="18" width="32" height="26" rx="5" fill="#1a1a2e" stroke="#00d4ff" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="24" cy="29" r="4" fill="#00d4ff" opacity="0.9"/>
  <circle cx="40" cy="29" r="4" fill="#00d4ff" opacity="0.9"/>
  <circle cx="24" cy="29" r="2" fill="#1a1a2e"/>
  <circle cx="40" cy="29" r="2" fill="#1a1a2e"/>
  <!-- Mouth / display -->
  <rect x="22" y="36" width="20" height="4" rx="2" fill="#00d4ff" opacity="0.6"/>
  <!-- Antenna -->
  <line x1="32" y1="18" x2="32" y2="10" stroke="#00d4ff" stroke-width="2"/>
  <circle cx="32" cy="8" r="3" fill="#00d4ff"/>
  <!-- Neck -->
  <rect x="28" y="44" width="8" height="5" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- Gear left -->
  <circle cx="10" cy="32" r="6" fill="none" stroke="#00d4ff" stroke-width="2"/>
  <circle cx="10" cy="32" r="2" fill="#00d4ff"/>
  <line x1="10" y1="24" x2="10" y2="26" stroke="#00d4ff" stroke-width="2"/>
  <line x1="10" y1="38" x2="10" y2="40" stroke="#00d4ff" stroke-width="2"/>
  <line x1="2" y1="32" x2="4" y2="32" stroke="#00d4ff" stroke-width="2"/>
  <line x1="16" y1="32" x2="18" y2="32" stroke="#00d4ff" stroke-width="2"/>
  <!-- Gear right -->
  <circle cx="54" cy="32" r="6" fill="none" stroke="#00d4ff" stroke-width="2"/>
  <circle cx="54" cy="32" r="2" fill="#00d4ff"/>
  <line x1="54" y1="24" x2="54" y2="26" stroke="#00d4ff" stroke-width="2"/>
  <line x1="54" y1="38" x2="54" y2="40" stroke="#00d4ff" stroke-width="2"/>
  <line x1="46" y1="32" x2="48" y2="32" stroke="#00d4ff" stroke-width="2"/>
  <line x1="60" y1="32" x2="62" y2="32" stroke="#00d4ff" stroke-width="2"/>
  <!-- Arms -->
  <line x1="16" y1="30" x2="10" y2="30" stroke="#00d4ff" stroke-width="2"/>
  <line x1="48" y1="30" x2="54" y2="30" stroke="#00d4ff" stroke-width="2"/>
</svg>
