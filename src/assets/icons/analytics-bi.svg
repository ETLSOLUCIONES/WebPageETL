<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Chart bars -->
  <rect x="8" y="36" width="10" height="16" rx="2" fill="#00d4ff" opacity="0.7"/>
  <rect x="22" y="24" width="10" height="28" rx="2" fill="#00d4ff" opacity="0.85"/>
  <rect x="36" y="16" width="10" height="36" rx="2" fill="#00d4ff"/>
  <rect x="50" y="28" width="10" height="24" rx="2" fill="#00d4ff" opacity="0.75"/>
  <!-- Trend line -->
  <polyline points="13,34 27,22 41,14 55,26" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Dots on trend line -->
  <circle cx="13" cy="34" r="3" fill="#ffffff"/>
  <circle cx="27" cy="22" r="3" fill="#ffffff"/>
  <circle cx="41" cy="14" r="3" fill="#ffffff"/>
  <circle cx="55" cy="26" r="3" fill="#ffffff"/>
  <!-- Base line -->
  <line x1="4" y1="54" x2="60" y2="54" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
  <!-- Y axis -->
  <line x1="4" y1="8" x2="4" y2="54" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
  <!-- Axis arrow up -->
  <polyline points="2,10 4,6 6,10" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Axis arrow right -->
  <polyline points="58,52 62,54 58,56" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
